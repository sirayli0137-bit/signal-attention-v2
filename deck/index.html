<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Signal — presentation deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#12232E;--ink2:#566773;--ink3:#66717A;--line:#E1E8EC;--brand:#13B5EA;--primary:#0A7DA6;--accent:#E6F7FD;--paper:#F6F8F9;--sage:#177E5D;--critical:#D93036}
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:#0E1B23;color:var(--ink);overflow:hidden}
  h1,h2,h3{font-family:'Figtree',system-ui,sans-serif;font-weight:800;letter-spacing:-.02em;margin:0}
  .stagewrap{position:fixed;inset:0;display:grid;place-items:center;padding:18px}
  .slide{width:min(96vw,calc(96vh*1.6));aspect-ratio:1.6/1;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 20px 80px -20px rgba(0,0,0,.6);position:relative}
  .slide img{width:100%;height:100%;object-fit:contain;background:#fff;display:block}
  .fit{width:1440px;height:900px;transform-origin:0 0;position:absolute;top:0;left:0}
  .gen{height:100%;display:flex;flex-direction:column;justify-content:center;padding:6% 8%}
  .badge{position:absolute;top:14px;right:16px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:14px}
  .badge.backup{background:#FFF3E6;color:#9A6200;border:1px solid #E8CBA2}
  .badge.appendix{background:var(--accent);color:var(--primary);border:1px solid #A9E0F5}
  .hud{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;padding:10px 16px;pointer-events:none}
  .count{font-size:12px;color:rgba(255,255,255,.75);font-variant-numeric:tabular-nums;background:rgba(255,255,255,.1);border-radius:10px;padding:5px 10px}
  .keys{font-size:11px;color:rgba(255,255,255,.45)}
  .notes{position:fixed;left:50%;transform:translateX(-50%);bottom:44px;max-width:860px;width:90vw;background:rgba(10,20,26,.92);color:#EAF2F6;border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 16px;font-size:14px;line-height:1.5;display:none}
  .notes.show{display:block}
  .notes b{color:#7FD8F5}
  .gt{font-size:15px;font-weight:600;color:var(--primary);letter-spacing:.02em}
  .mark{display:inline-grid;place-items:center;height:44px;width:44px;border-radius:12px;background:var(--brand)}
  @media print{ body{overflow:visible;background:#fff} .hud,.notes{display:none!important} .stagewrap{position:static;display:block;padding:0} .slide{width:100%;aspect-ratio:auto;height:100vh;border-radius:0;box-shadow:none;page-break-after:always} }
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;background:#0E1A21;z-index:99;display:flex;align-items:center;justify-content:center">
  <div style="width:min(420px,90vw);background:#fff;border-radius:18px;padding:34px 32px;text-align:center;font-family:Inter,system-ui,sans-serif">
    <span style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:13px;background:#13B5EA"><svg width="22" height="22" viewBox="0 0 13 13"><path d="M6.5.5 7.9 5.1 12.5 6.5 7.9 7.9 6.5 12.5 5.1 7.9.5 6.5 5.1 5.1Z" fill="#fff"/></svg></span>
    <h2 style="font-family:Figtree,sans-serif;font-weight:800;font-size:22px;margin:16px 0 6px;color:#12232E">Signal — presentation deck</h2>
    <p style="color:#566773;font-size:14px;margin:0 0 18px">This deck is password-protected.<br>Please use the password shared with the invite.</p>
    <input id="gpw" type="password" placeholder="Password" autocomplete="off" autofocus style="width:100%;font:inherit;font-size:15px;padding:11px 14px;border:1.5px solid #E1E8EC;border-radius:11px;outline:none;text-align:center;color:#12232E">
    <button id="ggo" style="width:100%;margin-top:10px;font:inherit;font-size:15px;font-weight:600;padding:11px 14px;border:none;border-radius:11px;background:#13B5EA;color:#fff;cursor:pointer">Open</button>
    <div id="gerr" style="color:#D93036;font-size:13px;height:18px;margin-top:8px"></div>
  </div>
</div>
<div class="stagewrap"><div class="slide" id="stage"></div></div>
<div class="hud">
  <span class="keys">← → navigate · F fullscreen · N notes · B jump past backups<span id="prep"> · <a href="run-sheet.html?p=1" target="_blank" style="color:rgba(255,255,255,.6);pointer-events:auto">run sheet</a> · <a href="talking-points.html" target="_blank" style="color:rgba(255,255,255,.6);pointer-events:auto">talking points</a> · <a href="qa-prep.html" target="_blank" style="color:rgba(255,255,255,.6);pointer-events:auto">Q&amp;A prep</a></span></span>
  <span class="count" id="count"></span>
</div>
<div class="notes" id="notes"></div>

<script>
"use strict";
const GOLD='Rank by consequence. Deliver by context. Earn trust by showing your work.';
const URLP='sirayli0137-bit.github.io/signal-attention-v2';

const S_TITLE=`<div class="gen" style="text-align:center;align-items:center;background:linear-gradient(150deg,#0C6E7A 0%,#13B5EA 60%,#4FC3E8 100%);color:#fff">
  <span class="mark" style="background:rgba(255,255,255,.2)"><svg width="22" height="22" viewBox="0 0 13 13"><path d="M6.5.5 7.9 5.1 12.5 6.5 7.9 7.9 6.5 12.5 5.1 7.9.5 6.5 5.1 5.1Z" fill="#fff"/></svg></span>
  <h1 style="font-size:64px;color:#fff;margin-top:22px">Signal</h1>
  <p style="font-size:24px;margin:10px 0 0;opacity:.92">Regain meaningful control over your attention</p>
  <p style="font-size:17px;margin:34px 0 0;font-weight:600;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);border-radius:26px;padding:12px 26px">${GOLD}</p>
  <p style="font-size:14px;opacity:.75;margin:30px 0 0">Siray Li · Product Design · notifications for an org Admin Center</p>
</div>`;

const S_PROCESS=`<div class="gen">
  <p class="gt">HOW I RAN IT</p>
  <h2 style="font-size:38px;margin-top:8px">Four AI practices, human at every gate</h2>
  <div style="display:flex;align-items:center;gap:8px;margin-top:22px;flex-wrap:wrap">
    ${['Brief → PRD','Checkpoint A','Journeys → Problems','Checkpoint B','Ideate → Score','Checkpoint C','Flow · IA · Wireframe · Mid-fi','Checkpoint D','Prototype → Audit → v1.3'].map((s,i)=>{
      const gate=s.startsWith('Checkpoint');
      return `<span style="font-size:13.5px;font-weight:600;padding:8px 12px;border-radius:11px;${gate?'background:#E6F7FD;color:#0A7DA6;border:1.5px solid #13B5EA':'background:#F3F7F9;border:1px solid #E1E8EC'}">${s}</span>${i<8?'<span style="color:#8A949C">→</span>':''}`;
    }).join('')}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;margin-top:24px">
    ${[['MASS prompt — the spine','AI broadens and deepens every divergent + convergent phase; I bring the critical, unique creative assessment to steer and navigate at six gates.'],
       ['Context engineering','The design system + brief overview sit at project level, so every output starts on-brand and on-brief. For other work this context can live above the project — problem-space or global.'],
       ['Prompt engineering','Maximum context per step, fast — rich briefs given by voice input at each stage.'],
       ['Automated research & synthesis','Skills + MCPs + screenshot references + auto-validation run comparative research and check outputs against the direction I set.']]
      .map(([t,d])=>`<div style="background:#F3F7F9;border:1px solid #E1E8EC;border-radius:13px;padding:13px 16px"><div style="font-family:Figtree;font-weight:800;font-size:16px;color:var(--primary)">${t}</div><div style="font-size:13.5px;color:var(--ink2);line-height:1.5;margin-top:4px">${d}</div></div>`).join('')}
  </div>
  <div style="display:flex;gap:34px;margin-top:22px;align-items:flex-end">
    ${[['6','checkpoints'],['18','ideas explored'],['26','cited patterns'],['17','audit findings'],['3','prototype versions']].map(([n,l])=>`<div><div style="font-family:Figtree;font-size:32px;font-weight:800;color:var(--primary)">${n}</div><div style="font-size:12.5px;color:var(--ink3)">${l}</div></div>`).join('')}
    <div style="font-size:13px;color:var(--ink2);margin-left:auto;max-width:34ch;line-height:1.5"><b>AI built between the gates — I decided at every one.</b> Every claim tagged Brief or Assumption; every decision logged.</div>
  </div>
</div>`;

const S_DEMO=`<div class="gen">
  <p class="gt">LIVE DEMO · 4 MINUTES</p>
  <h2 style="font-size:40px;margin-top:8px">${'One system, in her hands'}</h2>
  <p style="font-size:20px;margin-top:14px;color:var(--ink2)">→ <a href="https://${URLP}" target="_blank" rel="noopener" style="color:var(--primary);font-weight:700;text-decoration:underline">${URLP}</a></p>
  <p style="font-size:15px;color:var(--ink2);margin-top:10px">Following Mara’s journey — the same alert atom, surface by surface:</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 28px;margin-top:18px;font-size:16px;line-height:1.5">
    <div><b style="color:var(--primary)">1 · Break-through</b> — 10:02, on site: only the critical reaches her (push/SMS, wherever she is)</div>
    <div><b style="color:var(--primary)">3 · Desktop workbench</b> — the old way ⇄ Signal · act + undo · activity log · controls · Ask Signal</div>
    <div><b style="color:var(--primary)">2 · Native app</b> — the rich card: glance → data → confirm, one tap, reversible</div>
    <div><b style="color:var(--primary)">4 · Email / digest</b> — 20:30: the day reviewed, apply the recommendation, “sleep well”</div>
  </div>
  <p style="font-size:13.5px;color:var(--ink3);margin-top:14px">(backup screenshots follow, in the same order, if the demo can’t run)</p>
  <div style="display:flex;gap:34px;margin-top:30px">
    ${[['40 → 3','notifications needing her'],['118','handled without her'],['↓62%','interruptions'],['90 s','critical to resolved']].map(([n,l])=>`<div><div style="font-family:Figtree;font-size:34px;font-weight:800;color:var(--sage)">${n}</div><div style="font-size:13px;color:var(--ink3)">${l}</div></div>`).join('')}
  </div>
</div>`;

const S_CLOSE=`<div class="gen" style="text-align:center;align-items:center">
  <h2 style="font-size:44px;max-width:20ch">${GOLD}</h2>
  <p style="font-size:17px;color:var(--ink2);margin-top:26px;line-height:1.7">Prototype · <a href="https://${URLP}" target="_blank" rel="noopener" style="color:var(--primary);font-weight:700;text-decoration:underline">${URLP}</a><br>Process & evidence · MagicPath canvas (47 boards) · Q&A appendix follows</p>
  <p style="font-size:14px;color:var(--ink3);margin-top:30px">Siray Li — thank you</p>
</div>`;

const SLIDES=[
 {html:S_TITLE, note:'<b>Land:</b> one sentence — rank by consequence, deliver by context, earn trust by showing your work. Say it once now, once at the end.'},
 {html:S_PROCESS, note:'<b>1.5′.</b> Your MagicPath process diagram pairs with this. Four practices: MASS prompt (the gated spine) · context engineering (design system + brief at project level) · prompt engineering (rich context by voice) · automated research & synthesis (skills + MCPs + auto-validation). Land: “AI built between the gates, I decided at every one.”'},
 {img:'slides/s03_frame.png', note:'<b>1.5′.</b> Growth & retention via trust + efficiency. Access · Billing · Security earn interruptions. Context: Atlassian-style admin center — high-stakes, not Xero’s accounting turf.'},
 {img:'slides/s04_archetypes.png', note:'<b>45″.</b> Mara first — if the non-expert owner trusts it hands-off, IT and enterprise get power on top.'},
 {img:'slides/s05_heart.png', note:'<b>45″.</b> HEART-5. Trust & transparency is the GATE; Retention = how much she lets AI carry — the “letting go” metric.'},
 {img:'slides/s06_week.png', note:'<b>2′.</b> The insight slide: ~90% of her week is away from the desk. The CHANNEL, not just the content, is the design. Critical→SMS anywhere · action→one push · routine→digest · triage→desk.'},
 {img:'slides/s07_problems.png', note:'<b>1′.</b> Three problems, one system: right moment/channel · act with no setup · trust enough to let go.'},
 {img:'slides/s07a_principles.png', note:'<b>45″.</b> Five principles FROM her problems: minimal disruption · effortless efficiency · right moment/right channel · meaningful control · transparency earns confidence. Two forces in balance, held by control that earns trust.'},
 {img:'slides/s08_ideation.png', note:'<b>1′.</b> Diverged wide: 18 ideas, five scales, every one sourced (Mobbin + industry).'},
 {img:'slides/s09_scorecard.png', note:'<b>1′.</b> Scored impact × effort × scalability → A (triage brain) + B (router) now, C (copilot) later. Low-waste foundation C plugs into.'},
 {img:'slides/s10_flow.png', note:'<b>1′.</b> Not one competitor’s pattern — a cited synthesis: PagerDuty routing spine + iOS digest default + Gmail one-feed.'},
 {img:'slides/s11_channels.png', note:'<b>1.5′.</b> L1–L8 are the SYSTEM; app/desktop/SMS/Slack are DELIVERY. Point at the silent cells — the calm is designed.'},
 {img:'slides/s11b_layers.png', note:'<b>45″.</b> Mara’s future journey → the layers to design: event fires away → break-through (L1) → decide & act (L2) → confirm (L3) → catch-up at desk (L4) → trust (L5) → rhythm (L6). 7 surfaces now + copilot later. THIS is the demo’s running order.'},
 {img:'slides/s12_stack.png', note:'<b>1′.</b> Every layer’s pick ties back to a principle. Then: “let me show you — in her order.”'},
 {html:S_DEMO, note:'<b>4.5′ — the centrepiece.</b> Prototype tab; refresh = clean reset. Journey order: 1 break-through (mobile 10:02 push) → 2 native app (rich card, confirm) → 3 desktop (old way ⇄ Signal, act+undo, log, controls, Ask) → 4 digest (desktop Next-Up + mobile 20:30). If tech fails, arrow forward — backups are in the same order.'},
 {img:'demo/d08_mob_lock.png', backup:true, note:'BACKUP · 1 BREAK-THROUGH · 10:02 — only the critical reaches her, wherever she is.'},
 {img:'demo/d09_mob_card.png', backup:true, note:'BACKUP · 2 NATIVE APP · the rich card — trend vs suspension line, one confirm, reversible.'},
 {img:'demo/d01_oldway.png', backup:true, note:'BACKUP · 3 DESKTOP · the old way — 16 equal rows, spot the two that matter.'},
 {img:'demo/d02_feed.png', backup:true, note:'BACKUP · 3 DESKTOP · with Signal — 3 need you; severity dot + why + one action.'},
 {img:'demo/d03_confirmed.png', backup:true, note:'BACKUP · 3 DESKTOP · acted — inline confirm + undo.'},
 {img:'demo/d04_log.png', backup:true, note:'BACKUP · 3 DESKTOP · activity log — every AI decision, reversible.'},
 {img:'demo/d05_drawer.png', backup:true, note:'BACKUP · 3 DESKTOP · controls — AI-set defaults, Security locked.'},
 {img:'demo/d07_copilot.png', backup:true, note:'BACKUP · 3 DESKTOP · Ask Signal — answer deep-links to the flagged item.'},
 {img:'demo/d06_digest.png', backup:true, note:'BACKUP · 4 DIGEST · desktop Next-Up — donut, impact tiles, apply the recommendation.'},
 {img:'demo/d10_mob_evening.png', backup:true, note:'BACKUP · 4 DIGEST · 20:30 — one gentle digest ping.'},
 {img:'demo/d11_mob_digest_ask.png', backup:true, note:'BACKUP · 4 DIGEST · digest + copilot: “nothing urgent — sleep well.”'},
 {img:'slides/s14_audit.png', note:'<b>1′.</b> I audited my own prototype with design skills + the research — 17 findings, shipped v1.1–v1.3. Design is iteration, evidenced.'},
 {img:'slides/s15_ai.png', note:'<b>1′.</b> The AI story: it accelerated everything, decided nothing at the gates. Anecdotes: auto-resolve security (refused) · its own audit (I still overrode two findings).'},
 {img:'slides/s16_moretime.png', note:'<b>30″.</b> Next: real admins before more polish; model behind the same interface; measure the trust gate.'},
 {html:S_CLOSE, note:'<b>Close on the golden thread.</b> Then invite questions — appendix slides follow.'},
 {img:'slides/a1_brief6.png', appendix:true, note:'Q&A · the brief’s six questions, answered.'},
 {img:'slides/a2_pres1.png', appendix:true, note:'Q&A · framing + the prototype walk.'},
 {img:'slides/a3_a11y.png', appendix:true, note:'Q&A · components + accessibility evidence.'},
 {img:'slides/a4_mobaudit.png', appendix:true, note:'Q&A · mobile audit detail.'},
];

let i=Math.max(0,Math.min(SLIDES.length-1,(parseInt(location.hash.slice(1),10)||1)-1));
let showNotes=false;
const stage=document.getElementById('stage'), count=document.getElementById('count'), notes=document.getElementById('notes');
function applyFit(){
  document.querySelectorAll('.slide').forEach(sl=>{
    const f=sl.querySelector(':scope > .fit');
    if(f){ const sc=Math.min(sl.clientWidth/1440, sl.clientHeight/900); f.style.transform='scale('+sc+')'; }
  });
}
window.addEventListener('resize',applyFit);
function draw(){
  const s=SLIDES[i];
  stage.innerHTML=(s.img?`<img src="${s.img}" alt="slide ${i+1}">`:`<div class="fit">${s.html}</div>`)
    +(s.backup?'<span class="badge backup">Backup</span>':'')+(s.appendix?'<span class="badge appendix">Q&A appendix</span>':'');
  count.textContent=(i+1)+' / '+SLIDES.length;
  notes.innerHTML=s.note||''; notes.classList.toggle('show',showNotes&&!!s.note);
  location.hash=i+1;
  applyFit();
}
function go(d){ i=Math.max(0,Math.min(SLIDES.length-1,i+d)); draw(); }
// password gate (client-side)
(function(){
  const HASH='311d96cd0e5a6231365fe2c6acec2563cf878a3e6653c3a77b92de4662863e3b', KEY='sgl-pass';
  const gate=document.getElementById('gate'), pw=document.getElementById('gpw'), btn=document.getElementById('ggo'), err=document.getElementById('gerr');
  if(localStorage.getItem(KEY)===HASH){gate.remove();return}
  const sha=async s=>{const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')};
  const tryPw=async()=>{
    if(await sha(pw.value.trim())===HASH){localStorage.setItem(KEY,HASH);gate.remove()}
    else{err.textContent='That’s not it — try again.';pw.select()}
  };
  btn.addEventListener('click',e=>{e.stopPropagation();tryPw()});
  pw.addEventListener('keydown',e=>{e.stopPropagation();if(e.key==='Enter')tryPw()});
  gate.addEventListener('click',e=>e.stopPropagation());
})();
// presenter-only prep links: add ?p=1 to the deck URL to show them
if(new URLSearchParams(location.search).get('p')!=='1'){const pr=document.getElementById('prep');if(pr)pr.remove();}
document.addEventListener('keydown',e=>{
  if(document.getElementById('gate')||e.target.closest('input'))return;
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown') go(1);
  else if(e.key==='ArrowLeft'||e.key==='PageUp') go(-1);
  else if(e.key==='Home'){i=0;draw();}
  else if(e.key==='End'){i=SLIDES.length-1;draw();}
  else if(e.key.toLowerCase()==='f'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();}
  else if(e.key.toLowerCase()==='n'){showNotes=!showNotes;draw();}
  else if(e.key.toLowerCase()==='b'){ // jump past backups
    const n=SLIDES.findIndex((s,k)=>k>i&&!s.backup); if(n>0){i=n;draw();}
  }
});
document.addEventListener('click',e=>{ if(document.getElementById('gate')||e.target.closest('a'))return; if(e.clientX>innerWidth/2) go(1); else go(-1); });
// print mode: render all slides stacked
if(new URLSearchParams(location.search).has('print')){
  document.querySelector('.stagewrap').innerHTML=SLIDES.map((s,k)=>`<div class="slide">${s.img?`<img src="${s.img}">`:`<div class="fit">${s.html}</div>`}</div>`).join('');
  document.querySelector('.hud').style.display='none';
  setTimeout(applyFit,300);
}else{ draw(); }
</script>
</body>
</html>
